name: Keep API Awake

on:
  schedule:
    - cron: '7,17,27,37,47,57 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping healthcheck
        run: |
          curl --fail --silent --show-error --max-time 40 --retry 2 --retry-delay 5 "$BACKEND_HEALTHCHECK_URL"
        env:
          BACKEND_HEALTHCHECK_URL: ${{ secrets.BACKEND_HEALTHCHECK_URL }}
