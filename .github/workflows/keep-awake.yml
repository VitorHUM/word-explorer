name: Keep Render API Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping healthcheck
        run: |
          curl --fail --silent --show-error --max-time 30 --retry 2 --retry-delay 5 "$BACKEND_HEALTHCHECK_URL"
        env:
          BACKEND_HEALTHCHECK_URL: ${{ secrets.BACKEND_HEALTHCHECK_URL }}
