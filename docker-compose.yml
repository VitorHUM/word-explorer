services:
  postgres:
    image: postgres:17-alpine
    container_name: word-explorer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: word_explorer
      POSTGRES_USER: word_explorer
      POSTGRES_PASSWORD: word_explorer
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U word_explorer -d word_explorer']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: word-explorer-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  back-end:
    build:
      context: ./back-end
      target: production
    container_name: word-explorer-back-end
    restart: unless-stopped
    environment: &back-end-environment
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://word_explorer:word_explorer@postgres:5432/word_explorer?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_TTL_SECONDS: 3600
      THROTTLE_TTL_MS: 60000
      THROTTLE_LIMIT: 300
      AUTH_THROTTLE_TTL_MS: 60000
      AUTH_THROTTLE_LIMIT: 30
      JWT_SECRET: ${JWT_SECRET:-change-me-in-compose}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-60m}
      DICTIONARY_API_URL: ${DICTIONARY_API_URL:-https://api.dictionaryapi.dev/api/v2}
      DICTIONARY_CACHE_TTL_SECONDS: 3600
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "const http=require('http');const port=process.env.PORT||3001;const req=http.request({host:'127.0.0.1',port,path:'/health',timeout:3000},res=>process.exit(res.statusCode===200?0:1));req.on('error',()=>process.exit(1));req.on('timeout',()=>{req.destroy();process.exit(1)});req.end();",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  back-end-migrate:
    profiles: ['tools']
    build:
      context: ./back-end
      target: builder
    environment: *back-end-environment
    depends_on:
      postgres:
        condition: service_healthy
    command: ['npm', 'run', 'prisma:migrate:deploy']

  back-end-import:
    profiles: ['tools']
    build:
      context: ./back-end
      target: production
    environment: *back-end-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ['npm', 'run', 'dictionary:import:prod']

  front-end:
    build:
      context: ./front-end
      target: production
    container_name: word-explorer-front-end
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      API_BASE_URL: http://back-end:3001
    ports:
      - '3000:3000'
    depends_on:
      back-end:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "const http=require('http');const port=process.env.PORT||3000;const req=http.request({host:'127.0.0.1',port,path:'/',timeout:3000},res=>process.exit(res.statusCode<500?0:1));req.on('error',()=>process.exit(1));req.on('timeout',()=>{req.destroy();process.exit(1)});req.end();",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  postgres-data:
  redis-data:
